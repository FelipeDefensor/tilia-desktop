<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="youtube.css" />
  </head>
  <body>
    <div
      id="yt-player-iframe"
      width="640"
      height="360"
      src="https://www.youtube.com/embed?enablejsapi=1"
    ></div>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <script type="text/javascript">
      var backend;
      var player;
      var playerUpdateLoop;
      const _funcQueue = [];
      var videoParams;

      new QWebChannel(qt.webChannelTransport, function (channel) {
        backend = channel.objects.backend;
      });

      const tag = document.createElement("script");
      tag.id = "iframe-temp";
      tag.src = "https://www.youtube.com/iframe_api";
      const firstScriptTag = document.getElementsByTagName("script")[0];
      firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

      function _fnCall(fp) {
        player[fp.fn](...fp.params);
      }

      function _deQueue() {
        while (_funcQueue.length > 0) {
          _fnCall(_funcQueue.shift());
        }
      }

      function isPlayerLoaded() {
        return player !== undefined;
      }

      function _loadVideo(fp) {
        _fnCall(fp);
      }

      function _loadPlayer() {
        player = new YT.Player("yt-player-iframe", {
          events: {
            onError: onError,
            onPlaybackRateChange: onPlaybackRateChange,
            onStateChange: onPlayerStateChange,
          }
        });
      }

      function onYouTubeIframeAPIReady() {
        _loadPlayer();
        if (videoParams !== undefined) {
          _loadVideo(videoParams);
        }
      }

      function tryPlayerFunctionElseQueue(fn, ...params) {
        const fp = { fn, params };
        if (fn === "loadPlaylist") {
          if (isPlayerLoaded()) {
            _loadVideo(fp);
          } else {
            videoParams = fp;
          }
        } else {
          if (isPlayerLoaded() && player.getDuration() != 0) {
            _fnCall(fp);
          } else {
            _funcQueue.push(fp);
          }
        }
      }

      function onPlayerStateChange(event) {
        const playerStatus = event.data;
        backend.on_player_state_change(playerStatus);

        switch (playerStatus) {
          case YT.PlayerState.PLAYING:
            playerUpdateLoop = setInterval(updateTime, 100);
            break;
          case YT.PlayerState.UNSTARTED:
            clearInterval(playerUpdateLoop);
            _deQueue();
            break;
          default:
            clearInterval(playerUpdateLoop);
        }
      }

      function onError(event) {
        switch (event.data) {
          case 2:
            backend.on_error(
              "The request contains an invalid parameter value. For example, this error occurs if you specify a video ID that does not have 11 characters, or if the video ID contains invalid characters, such as exclamation points or asterisks.",
            );
            break;

          case 5:
            backend.on_error(
              "The requested content cannot be played in an HTML5 player or another error related to the HTML5 player has occurred.",
            );
            break;

          case 100:
            backend.on_error(
              "The video requested was not found. This error occurs when a video has been removed (for any reason) or has been marked as private.",
            );
            break;

          case 101:
          case 150:
            backend.on_error(
              "The owner of the requested video does not allow it to be played in embedded players.",
            );
            break;

          default:
            backend.on_error("Error code: ${event.data}.");
        }
      }

      function updateTime() {
        backend.on_new_time(player.getCurrentTime());
      }

      function loadVideo(id) {
        tryPlayerFunctionElseQueue("loadPlaylist", [id]);
      }

      function seekTo(time) {
        tryPlayerFunctionElseQueue("seekTo", time, true);
      }

      function getDuration() {
        if (isPlayerLoaded()) {
          return player.getDuration();
        }
        return null;
      }

      function play() {
        tryPlayerFunctionElseQueue("playVideo");
      }

      function pause() {
        tryPlayerFunctionElseQueue("pauseVideo");
      }

      function stop() {
        tryPlayerFunctionElseQueue("stopVideo");
      }

      function setVolume(volume) {
        tryPlayerFunctionElseQueue("setVolume", volume);
      }

      function mute() {
        tryPlayerFunctionElseQueue("mute");
      }

      function unMute() {
        tryPlayerFunctionElseQueue("unMute");
      }

      function tryPlaybackRate(playbackRate) {
        tryPlayerFunctionElseQueue("setPlaybackRate", playbackRate);
      }

      function onPlaybackRateChange(event) {
        backend.on_set_playback_rate(event.data);
      }

      function setLoop(isLooping) {
        tryPlayerFunctionElseQueue("setLoop", isLooping);
      }
    </script>
  </body>
</html>
